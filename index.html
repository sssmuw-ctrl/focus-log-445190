<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Focus Log</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="--accent: #2563eb">
  <main>
    <header>
      <p class="eyebrow">Productivity tools / public</p>
      <h1>Focus Log</h1>
      <p>A simple log for deep work sessions.</p>
    </header>

    <section class="panel">
      <h2>Project Idea</h2>
      <p>Record what was done and what comes next.</p>
      <div class="actions">
        <button id="add">Add sample card</button>
        <button id="clear">Reset</button>
      </div>
    </section>

    <section class="grid" id="cards" aria-live="polite"></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
